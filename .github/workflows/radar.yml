name: Radar Gunluk Bulten

on:
  schedule:
    # GitHub cron UTC ile calisir. 03:30 UTC = 06:30 Europe/Istanbul (UTC+3).
    - cron: '30 3 * * *'
  workflow_dispatch:   # Actions sekmesinden elle tetikleme butonu

permissions:
  contents: write      # archive/ ve index.html'i repoya geri yazabilmek icin gerekli

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      - name: Radar'i calistir (bulten + arsiv + index)
        run: python radar.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:   ${{ secrets.OPENAI_MODEL }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          MAIL_TO:        ${{ secrets.MAIL_TO }}
          SITE_URL:       ${{ secrets.SITE_URL }}

      - name: Arsivi repoya kaydet
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add archive index.html
          git commit -m "Bulten arsivi: $(TZ=Europe/Istanbul date +%F)" || echo "Degisiklik yok, commit atlandi."
          git push
